# Local dev stack. LiteLLM proxy + Ollama join at M1.5 (gateway); Ollama runs on the host.
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: iea
      POSTGRES_PASSWORD: iea
      POSTGRES_DB: iea
    ports:
      - "5432:5432"
    volumes:
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iea -d iea"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
