# Fast local mirror of CI (docs/09-infra-devops/dev-workflow.md).
# Install:  make hooks   (commit hooks + the slower pre-push mypy)
default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # Strict typing is slower — run it at pre-push, against the project's uv env.
  - repo: local
    hooks:
      - id: mypy
        name: mypy --strict
        entry: uv run mypy .
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
