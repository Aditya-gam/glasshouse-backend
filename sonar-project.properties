# SonarQube Cloud (SonarCloud) project config. CONFIRM org + projectKey on the SonarCloud
# project page (Administration / Information) before the first scan.
sonar.organization=aditya-gam
sonar.projectKey=Aditya-gam_glasshouse-backend

sonar.sources=app
sonar.tests=tests
sonar.python.version=3.12

# Coverage emitted by `pytest --cov=app --cov-report=xml` in the CI test job.
sonar.python.coverage.reportPaths=coverage.xml

# Migrations are forward-only boilerplate; the export script is generated tooling.
sonar.exclusions=alembic/versions/**
sonar.coverage.exclusions=alembic/**,scripts/**

# Make the scanner wait for the Quality Gate and exit non-zero if it fails (the gate).
sonar.qualitygate.wait=true
